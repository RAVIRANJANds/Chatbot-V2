<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediseller Support</title>
 
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

    <!-- ================= HEADER ================= -->

    <div class="chat-header">

        <div class="company-logo">
            <img
                src="https://tse3.mm.bing.net/th/id/OIP.ZCnMt1XqPZqMKyUJgQQlMQAAAA?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
                alt="Mediseller Logo">
        </div>

        <div class="chat-icon">
            💬
        </div>

        <h2>Mediseller Support</h2>

    </div>

    <!-- ================= CHAT BODY ================= -->

    <div class="chat-body" id="chatBody">

        <!-- Messages will appear here dynamically -->

    </div>

    <!-- ================= QUICK ACTIONS ================= -->

    <div class="quick-actions">

        <button class="option-btn"
            onclick="selectOption('Track My Order')">
            📦 Track Order
        </button>

        <button class="option-btn"
            onclick="selectOption('Product Reorder')">
            🔄 Reorder
        </button>

        <button class="option-btn"
            onclick="selectOption('Raise a Ticket')">
            🎫 Raise Ticket
        </button>

        <button class="option-btn"
            onclick="selectOption('FAQs')">
            ❓ FAQ
        </button>

        <button class="option-btn"
            onclick="selectOption('WhatsApp Support')">
            💬 WhatsApp
        </button>

    </div>

    <!-- ================= FOOTER ================= -->

    <div class="chat-footer">

        <input
            type="text"
            id="userInput"
            placeholder="Type your response here..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
